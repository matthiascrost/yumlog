<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Restaurants - Yumlog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red:    #E63946;
      --orange: #F4622A;
      --yellow: #F9A825;
      --cream:  #FFF8F0;
      --dark:   #2C2C2C;
      --mid:    #666;
      --light:  #f2f2f2;
      --white:  #ffffff;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--cream); color: var(--dark); }
    a { text-decoration: none; color: inherit; }
    nav { background: linear-gradient(135deg, var(--red), var(--orange)); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .nav-logo span { color: white; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a { color: white; font-weight: 500; font-size: 0.95rem; opacity: 0.9; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 1; }
    .nav-links .btn-login { background: rgba(255,255,255,0.2); padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); }
    .nav-links .btn-signup { background: white; color: var(--orange) !important; padding: 0.4rem 1rem; border-radius: 20px; font-weight: 700 !important; opacity: 1 !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { width: 24px; height: 2px; background: white; border-radius: 2px; }
    .mobile-menu { display: none; position: absolute; top: 64px; left: 0; right: 0; background: linear-gradient(135deg, var(--red), var(--orange)); padding: 1rem 1.5rem; flex-direction: column; gap: 1rem; z-index: 99; }
    .mobile-menu a { color: white; font-weight: 500; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.15); }
    .mobile-menu.open { display: flex; }
    .search-header { background: white; padding: 1.25rem 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .search-container { max-width: 1200px; margin: 0 auto; }
    .search-main { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .search-box { flex: 1; display: flex; background: var(--light); border-radius: 50px; overflow: hidden; border: 2px solid transparent; transition: border 0.2s; }
    .search-box:focus-within { border-color: var(--orange); }
    .search-box input { flex: 1; border: none; outline: none; padding: 0.85rem 1.25rem; font-size: 0.95rem; background: transparent; }
    .search-box button { background: linear-gradient(135deg, var(--red), var(--orange)); color: white; border: none; padding: 0 1.75rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
    .search-box button:hover { opacity: 0.9; }
    .location-badge { display: flex; align-items: center; gap: 0.5rem; background: var(--light); padding: 0.85rem 1.25rem; border-radius: 50px; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .location-badge:hover { background: #e8e8e8; }
    .location-badge.active { background: #d4edda; color: #155724; }
    .location-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } }
    .filter-toggle-mobile { display: none; background: var(--orange); color: white; border: none; padding: 0.85rem 1.5rem; border-radius: 50px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 0.75rem; }
    .main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem; display: flex; gap: 1.5rem; }
    .sidebar { width: 260px; flex-shrink: 0; }
    .sidebar.mobile-open { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; background: rgba(0,0,0,0.5); z-index: 200; padding: 0; }
    .sidebar-content { background: white; border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); position: sticky; top: 80px; }
    .sidebar.mobile-open .sidebar-content { position: fixed; bottom: 0; left: 0; right: 0; top: auto; border-radius: var(--radius) var(--radius) 0 0; max-height: 80vh; overflow-y: auto; }
    .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 2px solid var(--light); }
    .filter-header h3 { font-size: 1.1rem; font-weight: 800; }
    .filter-clear { color: var(--orange); font-size: 0.8rem; font-weight: 600; cursor: pointer; background: none; border: none; }
    .filter-close { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--mid); }
    .sidebar.mobile-open .filter-close { display: block; }
    .filter-group { margin-bottom: 1.5rem; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.5rem; display: block; color: var(--dark); }
    .filter-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .filter-option { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.35rem 0; }
    .filter-option input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--orange); }
    .filter-option label { font-size: 0.9rem; cursor: pointer; flex: 1; }
    .cuisine-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .cuisine-tile { background: var(--light); border: 2px solid transparent; padding: 0.65rem 0.5rem; border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; font-weight: 600; font-size: 0.85rem; }
    .cuisine-tile:hover { background: #e8e8e8; transform: translateY(-1px); }
    .cuisine-tile.active { background: #ffe5e5; border-color: var(--orange); color: var(--orange); }
    .tile-icon { font-size: 1.5rem; line-height: 1; }
    .tile-name { font-size: 0.8rem; }
    .price-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .price-btn { background: var(--light); border: 2px solid var(--light); padding: 0.4rem 0.9rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .price-btn:hover { background: #e8e8e8; }
    .price-btn.active { background: #ffe5e5; border-color: var(--orange); color: var(--orange); }
    .rating-options { display: flex; flex-direction: column; gap: 0.4rem; }
    .rating-option { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem; cursor: pointer; border-radius: 6px; transition: background 0.2s; }
    .rating-option:hover { background: var(--light); }
    .rating-option input { accent-color: var(--orange); }
    .stars { color: var(--yellow); font-size: 0.9rem; }
    .results { flex: 1; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .results-count { font-size: 0.95rem; color: var(--mid); }
    .results-count strong { color: var(--dark); font-weight: 700; }
    .sort-select { padding: 0.5rem 0.75rem; border: 2px solid var(--light); border-radius: 8px; font-size: 0.85rem; background: white; cursor: pointer; font-weight: 600; }
    .restaurant-grid { display: grid; gap: 1rem; }
    .restaurant-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .restaurant-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.13); }
    .card-img { width: 140px; height: 140px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .card-badge { position: absolute; top: 8px; left: 8px; background: var(--yellow); color: var(--dark); font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 20px; }
    .card-body { padding: 1rem 1.25rem; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .card-body h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.35rem; color: var(--dark); }
    .card-meta { font-size: 0.85rem; color: var(--mid); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .card-rating { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
    .rating-num { font-weight: 700; color: var(--dark); margin-left: 0.25rem; }
    .review-count { font-size: 0.8rem; color: var(--mid); }
    .card-badges { display: flex; gap: 0.4rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .mini-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 12px; background: var(--light); color: var(--mid); font-weight: 600; }
    .mini-badge.open { background: #d4edda; color: #155724; }
    .load-more { text-align: center; margin-top: 2rem; }
    .load-more button { background: white; border: 2px solid var(--orange); color: var(--orange); padding: 0.85rem 2.5rem; border-radius: 50px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .load-more button:hover { background: var(--orange); color: white; }
    #customTimeInput { display: none; margin-top: 0.75rem; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .search-main { flex-direction: column; }
      .location-badge { justify-content: center; }
      .filter-toggle-mobile { display: block; }
      .sidebar { display: none; }
      .sidebar.mobile-open { display: block; }
      .main { padding: 1rem; }
      .restaurant-card { flex-direction: column; }
      .card-img { width: 100%; height: 160px; }
    }
  </style>
</head>
<body data-page="search">
<nav>
  <div class="nav-logo" onclick="location.href='index.html'">
    <svg width="38" height="38" viewBox="0 0 60 60" style="background:white;border-radius:50%;padding:3px;">
      <ellipse cx="30" cy="38" rx="22" ry="10" fill="#F4622A"/>
      <path d="M 8 35 Q 8 55 30 55 Q 52 55 52 35 Z" fill="#F4622A"/>
      <path d="M 10 35 Q 10 53 30 53 Q 50 53 50 35 Z" fill="#FF6B35"/>
      <ellipse cx="30" cy="35" rx="22" ry="6" fill="#E63946"/>
      <ellipse cx="30" cy="35" rx="20" ry="5" fill="#FF8C5A"/>
      <circle cx="24" cy="33" r="2.5" fill="white"/><circle cx="36" cy="33" r="2.5" fill="white"/>
      <circle cx="24.5" cy="32.5" r="1.2" fill="#E63946"/><circle cx="36.5" cy="32.5" r="1.2" fill="#E63946"/>
      <path d="M 22 38 Q 30 43 38 38" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <line x1="6" y1="16" x2="13" y2="40" stroke="#c0874a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="2" y1="16" x2="9" y2="40" stroke="#c0874a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="54" y1="16" x2="47" y2="40" stroke="#c0874a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="58" y1="16" x2="51" y2="40" stroke="#c0874a" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span>Yumlog</span>
  </div>
  <div class="nav-links" id="navLinks">
    <a href="search.html" style="opacity:1;font-weight:700;">Explore</a>
    <a href="#">Top Reviewers</a>
    <a href="#">Blog</a>
    <a href="login.html" class="btn-login">Log in</a>
    <a href="login.html" class="btn-signup">Sign up</a>
  </div>
  <div class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')">
    <span></span><span></span><span></span>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu"></div>
<div class="search-header">
  <div class="search-container">
    <div class="search-main">
      <div class="search-box">
        <input type="text" placeholder="Search restaurants, cuisines, dishes...">
        <button>🔍 Search</button>
      </div>
      <div class="location-badge active">
        <div class="dot"></div>
        <span><strong>Sydney CBD</strong> • 5km</span>
      </div>
    </div>
    <button class="filter-toggle-mobile" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">🎛️ Filters</button>
  </div>
</div>
<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <div class="filter-header">
        <h3>Filters</h3>
        <button class="filter-close" onclick="document.getElementById('sidebar').classList.remove('mobile-open')">✕</button>
        <button class="filter-clear">Clear all</button>
      </div>
      <div class="filter-group">
        <label class="filter-label">Cuisine</label>
        <div class="cuisine-tiles">
          <button class="cuisine-tile" data-cuisine="italian"><span class="tile-icon">🍝</span><span class="tile-name">Italian</span></button>
          <button class="cuisine-tile" data-cuisine="chinese"><span class="tile-icon">🥡</span><span class="tile-name">Chinese</span></button>
          <button class="cuisine-tile" data-cuisine="japanese"><span class="tile-icon">🍣</span><span class="tile-name">Japanese</span></button>
          <button class="cuisine-tile" data-cuisine="mexican"><span class="tile-icon">🌮</span><span class="tile-name">Mexican</span></button>
          <button class="cuisine-tile" data-cuisine="thai"><span class="tile-icon">🍜</span><span class="tile-name">Thai</span></button>
          <button class="cuisine-tile" data-cuisine="indian"><span class="tile-icon">🍛</span><span class="tile-name">Indian</span></button>
          <button class="cuisine-tile" data-cuisine="french"><span class="tile-icon">🥐</span><span class="tile-name">French</span></button>
          <button class="cuisine-tile" data-cuisine="greek"><span class="tile-icon">🥙</span><span class="tile-name">Greek</span></button>
          <button class="cuisine-tile" data-cuisine="vegan"><span class="tile-icon">🥗</span><span class="tile-name">Vegan</span></button>
          <button class="cuisine-tile" data-cuisine="american"><span class="tile-icon">🍔</span><span class="tile-name">American</span></button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Rating</label>
        <div class="rating-options">
          <div class="rating-option"><input type="radio" name="rating" id="r45"><label for="r45"><span class="stars">★★★★★</span> 4.5+</label></div>
          <div class="rating-option"><input type="radio" name="rating" id="r40" checked><label for="r40"><span class="stars">★★★★☆</span> 4.0+</label></div>
          <div class="rating-option"><input type="radio" name="rating" id="r35"><label for="r35"><span class="stars">★★★☆☆</span> 3.5+</label></div>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Price</label>
        <div class="price-options">
          <button class="price-btn">$</button>
          <button class="price-btn">$$</button>
          <button class="price-btn">$$$</button>
          <button class="price-btn">$$$$</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Hours</label>
        <div class="filter-options">
          <div class="filter-option"><input type="checkbox" id="opennow" checked><label for="opennow">Open now</label></div>
          <div class="filter-option"><input type="checkbox" id="latenight"><label for="latenight">Open late (10pm+)</label></div>
          <div class="filter-option"><input type="checkbox" id="customhours" onchange="toggleCustomTime()"><label for="customhours">Custom time</label></div>
        </div>
        <div id="customTimeInput">
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <input type="time" id="customTime" value="14:00" style="flex:1;padding:0.5rem;border:2px solid var(--light);border-radius:8px;font-size:0.9rem;">
            <select id="customDay" style="flex:1;padding:0.5rem;border:2px solid var(--light);border-radius:8px;font-size:0.9rem;">
              <option>Today</option><option>Tomorrow</option><option>Monday</option><option>Tuesday</option>
              <option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
            </select>
          </div>
          <button onclick="applyCustomTime()" style="width:100%;margin-top:0.5rem;background:var(--orange);color:white;border:none;padding:0.5rem;border-radius:8px;font-weight:600;cursor:pointer;">Apply</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Accessibility</label>
        <div class="filter-options">
          <div class="filter-option"><input type="checkbox" id="wheelchair"><label for="wheelchair">Wheelchair accessible</label></div>
          <div class="filter-option"><input type="checkbox" id="parking"><label for="parking">Parking available</label></div>
        </div>
      </div>
    </div>
  </aside>
  <div class="results">
    <div class="results-header">
      <div class="results-count" id="resultsCount"><strong>Loading...</strong></div>
      <select class="sort-select">
        <option>Best match</option>
        <option>Highest rated</option>
        <option>Most reviewed</option>
        <option>Nearest first</option>
      </select>
    </div>
    <div class="restaurant-grid" id="restaurantGrid"></div>
    <div class="load-more"><button onclick="alert('In the full app, this would load more results from the server.')">Load More Restaurants</button></div>
  </div>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
  function toggleCustomTime() {
    const cb = document.getElementById('customhours');
    document.getElementById('customTimeInput').style.display = cb.checked ? 'block' : 'none';
    if (cb.checked) document.getElementById('opennow').checked = false;
  }
  function applyCustomTime() {
    const time = document.getElementById('customTime').value;
    const day = document.getElementById('customDay').value;
    const [h, m] = time.split(':');
    const hr = parseInt(h);
    const ampm = hr >= 12 ? 'PM' : 'AM';
    const disp = `${hr > 12 ? hr - 12 : hr || 12}:${m} ${ampm}`;
    alert(`Filtering for restaurants open at ${disp} on ${day}.`);
  }
</script>
</body>
</html>
